spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
  flyway:
    enabled: false

  datasource:
    url: "jdbc:hsqldb:mem:testdb;sql.syntax_mys=true"
#    postgresSQL (psql)
#    url:"jdbc:hsqldb:mem:testdb;sql.syntax_pgs=true"
#    oracle
#    url:"jdbc:hsqldb:mem:testdb;sql.syntax_ora=true"

  # Add OAuth2 configuration for tests
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-client-id
            client-secret: test-client-secret
            scope: read:user

my-mobile:
  remember-me-key: test

mail:
  app-mail: "mobilele@mobilele.com"
  host: "localhost"
  port: 3333
  username: test
  password: test

open.exchange.rates:
  schema: https
  host: dummy
  path: /api/latest.json
  app_id: test
  symbols: BGN,EUR,GBP
  decimal-precision: 3
  enabled: false

google:
  recaptcha:
    site: test-site-key
    secret: test-secret-key
    enabled: false