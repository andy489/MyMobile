services:
  mysql:
    image: mysql:8.0
    container_name: mymobile-mysql
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"  # Allows empty root password
      MYSQL_DATABASE: mymobile
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --skip-grant-tables
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    container_name: mymobile-mailhog
    restart: always
    ports:
      - "1025:1025"  # SMTP server (for your Spring Boot app)
      - "8025:8025"  # Web UI (http://localhost:8025)

volumes:
  mysql_data:

